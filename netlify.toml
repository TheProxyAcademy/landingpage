[build]
  command = "pnpm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18.18.0"
  PNPM_VERSION = "9"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Flutterwave API (must come before SPA fallback)
[[redirects]]
  from = "/api/flutterwave/create-checkout"
  to = "/.netlify/functions/flutterwave-create-checkout"
  status = 200
  force = true

[[redirects]]
  from = "/api/flutterwave/verify"
  to = "/.netlify/functions/flutterwave-verify"
  status = 200
  force = true

# React Router — static files (e.g. /focusflow-cohort/index.html) are served first
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
