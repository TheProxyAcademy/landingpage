[build]
  command = "pnpm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18.18.0"
  PNPM_VERSION = "9"
  
# Force npm usage
[build.processing]
  skip_processing = false

# Client-side routes (/register, /summer-bootcamp): serve index.html so React Router runs.
# Also ship public/_redirects into build/ as a fallback if deploy root omits this file.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200